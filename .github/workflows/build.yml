name: Build JemyPedia Flutter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Patch plugin namespaces and compileSdk for AGP 8
        run: python3 scripts/patch_plugins.py

      - name: Build Android APK (Release + Obfuscated)
        run: flutter build apk --release --obfuscate --split-debug-info=symbols/android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JemyPedia-Flutter-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-windows:
    runs-on: windows-2022
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Windows Executable (Release)
        run: flutter build windows --release --obfuscate --split-debug-info=symbols/windows

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JemyPedia-Flutter-Windows-Release
          path: build/windows/x64/runner/Release/
          retention-days: 30
